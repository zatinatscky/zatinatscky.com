# Стек IVAN на одном VPS: PostgreSQL + web (Flask/Dash) + Caddy (авто-HTTPS).
# Значения секретов берутся из .env (см. .env.example).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # web стартует только когда БД реально готова принимать подключения.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Код сам добавит +psycopg к postgresql:// (см. fng_data._normalize_database_url).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTO_SYNC_ON_START: "true"
      DASH_ROOT_HOST: ${DASH_ROOT_HOST}
      CRON_TOKEN: ${CRON_TOKEN}
    # Наружу не публикуем — доступ только через Caddy по внутренней сети.
    expose:
      - "8050"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # сертификаты Let's Encrypt (важно сохранять)
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
