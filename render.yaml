databases:
  - name: zatinatscky-postgres
    databaseName: zatinatscky
    user: zatinatscky

services:
  - type: web
    name: zatinatscky-site
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: AUTO_SYNC_ON_START
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: zatinatscky-postgres
          property: connectionString
      - key: CRON_TOKEN
        value: CHANGE_ME_TO_RANDOM_LONG_TOKEN

  - type: cron
    name: fear-greed-daily-sync
    env: python
    schedule: "15 3 * * *"
    # Только requests — см. requirements-cron.txt (полный requirements.txt
    # для веба тянет pandas/Dash и может «висеть» на metadata в билде cron).
    buildCommand: pip install --upgrade pip && pip install -r requirements-cron.txt
    startCommand: python scripts/trigger_fng_sync.py
    envVars:
      - key: SITE_BASE_URL
        value: https://zatinatscky.com
      - key: CRON_TOKEN
        value: CHANGE_ME_TO_RANDOM_LONG_TOKEN
